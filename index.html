<main>
  <div class="wrap">
    <div id="eSt">
        <img src="img/slime_blue.png" alt="enemy_img"  width="200" height="200">
        <div  class="nes-container is-rounded is-dark statusWin">
          <p id="eName">敵</p>
          <p id="eHp">100/100</p>
          <progress id="ehpbar"  class="nes-progress is-primary" value="100" max="100"></progress>
        </div>
    </div>

    <div id="st">
        <img src="img/haigo.png" alt="hero_img" width="250" height="250">
        <div  class="nes-container is-rounded is-dark statusWin">
          <p id="name">自分</p>
          <p id="hp">100/100</p>
          <progress id="hpbar"  class="nes-progress is-primary" value="100" max="100"></progress>
        </div>
    </div>




    <div class="nes-container is-dark with-title" id="window">
        <div id="selwin" class="nes-container is-dark with-title">
            <button id="attack-pop-btn" class="act-btn">攻撃</button>
            <div class="atk-pop-win popClose">
                <ul>
                    <li><button></button></li>
                    <li><button></button></li>
                </ul>
                <button class="return-btn"></button>
            </div>
            <button id="magic-pop-btn" class="act-btn">魔法</button>
            <div class="mgi-pop-win popClose">
                <ul>
                    <li><button></button></li>
                    <li><button></button></li>
                    <li><button></button></li>
                    <li><button></button></li>
                </ul>
                <button class="return-btn"></button>
            </div>
        </div>
        <div id="meswin" class="nes-container is-dark with-title">
            <p>メッセージ</p>
        </div>
    </div>
    </div>
</main>
